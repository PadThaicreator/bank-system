name: Full CI

on:
  push:
    branches: [ "main" , "dev-namo" ]
  pull_request:
    branches: [ "main"  , "dev-namo" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'
          
      - name: Grant execute permission for gradlew
        run: chmod +x ./backend/gradlew
        
      - name: Build Backend
        run: |
            cd backend
            chmod +x gradlew   
            ./gradlew build
            
      - name: Run Backend Unit Tests
        run: |
            cd backend
            chmod +x gradlew
            ./gradlew test

      - name: Upload test report
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
