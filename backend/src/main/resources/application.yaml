  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: false   # ปิดไว้ก่อน เปิดทีหลังเมื่อพร้อม

  # # Flyway — จัดการ DB migration (แนะนำใช้แทน ddl-auto: create)
