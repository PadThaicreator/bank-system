# Server
server:
  port: 8080
  servlet:
    context-path: /api          # ทุก endpoint จะขึ้นต้นด้วย /api

# JWT
jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-only-min-32-chars}
  access-token-expiry: 900000   # 15 นาที
  refresh-token-expiry: 604800000 # 7 วัน

# App custom config
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# Logging
logging:
  level:
    com.banking: DEBUG           # log แค่ package ของเรา
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs